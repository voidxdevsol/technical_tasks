name: Task 1 — Frontend (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: solutions/task1_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright WebKit + system deps
        run: bunx playwright install --with-deps webkit

      - name: Run tests
        run: bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: solutions/task1_frontend/playwright-report/
          retention-days: 7

      - name: Upload traces and screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: solutions/task1_frontend/test-results/
          retention-days: 7
